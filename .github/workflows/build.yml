name: Build and Release

on:
  push:
    branches: ['main', 'dev']
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: ['main', 'dev']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blazorpack-decode

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag-triggered: use tag version (e.g. v1.0.0 → 1.0.0)
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          else
            # Branch push: extract from build.gradle
            VER=$(grep "cmdVersion ?:" build.gradle | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: ./gradlew test

      - name: Build JAR
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ./gradlew jar -Pversion=${{ steps.version.outputs.version }}
          else
            ./gradlew jar
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlazorSpy-${{ steps.version.outputs.version }}
          path: blazorpack-decode/build/libs/BlazorSpy-${{ steps.version.outputs.version }}.jar
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR="blazorpack-decode/build/libs/BlazorSpy-${{ steps.version.outputs.version }}.jar"
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "BlazorSpy $TAG" \
            --generate-notes \
            --verify-tag \
            "$JAR" \
          || gh release upload "$TAG" "$JAR" --clobber
