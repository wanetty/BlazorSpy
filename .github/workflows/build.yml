name: Build and Release

on:
  push:
    branches: ['main', 'dev']
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: ['main', 'dev']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blazorpack-decode
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION="${{ github.ref_name }}"
            echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep "cmdVersion ?:" build.gradle | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: ./gradlew test

      - name: Build JAR
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ./gradlew jar -Pversion=${{ steps.version.outputs.version }}
          else
            ./gradlew jar
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlazorSpy-${{ steps.version.outputs.version }}
          path: blazorpack-decode/build/libs/BlazorSpy-${{ steps.version.outputs.version }}.jar
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only release on tags that are reachable from main
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for branch check

      - name: Verify tag is on main
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "${{ github.ref }}")
          if git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "✓ Tag ${{ github.ref_name }} is on main — proceeding with release"
          else
            echo "✗ Tag ${{ github.ref_name }} is NOT on main — refusing to release"
            echo "  Tags must be created on the main branch only."
            exit 1
          fi

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: BlazorSpy-${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          JAR="BlazorSpy-${TAG#v}.jar"
          gh release create "$TAG" \
            --title "BlazorSpy $TAG" \
            --generate-notes \
            --verify-tag \
            "$JAR" \
          || gh release upload "$TAG" "$JAR" --clobber
